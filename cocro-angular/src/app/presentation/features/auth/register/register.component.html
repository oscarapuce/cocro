<div class="register-page">
  <span class="register-page__deco register-page__deco--1" aria-hidden="true"></span>
  <span class="register-page__deco register-page__deco--2" aria-hidden="true"></span>
  <span class="register-page__deco register-page__deco--3" aria-hidden="true"></span>
  <span class="register-page__deco register-page__deco--4" aria-hidden="true"></span>
  <div class="register-page__brand">
    <h1>CoCro</h1>
    <p class="text-muted">Créer un compte</p>
  </div>

  <div class="register-page__card">
    <div class="register-page__header">
      <span class="section-label">Inscription</span>
      <hr class="divider" />
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="register-page__form">
      <cocro-input
        label="Pseudo"
        placeholder="votre pseudo"
        formControlName="username"
        [hasError]="form.controls.username.invalid && form.controls.username.touched"
        errorMessage="Pseudo requis (min. 3 caractères)"
      />

      <cocro-input
        label="Mot de passe"
        type="password"
        placeholder="••••••••"
        formControlName="password"
        [hasError]="form.controls.password.invalid && form.controls.password.touched"
        errorMessage="Mot de passe requis (min. 6 caractères)"
      />

      <cocro-input
        label="Email (optionnel)"
        type="email"
        placeholder="vous@exemple.com"
        formControlName="email"
      />

      @if (error()) {
        <p class="register-page__error">{{ error() }}</p>
      }

      <cocro-button type="submit" [loading]="loading()">
        Créer mon compte
      </cocro-button>
    </form>

    <hr class="divider" />
    <p class="register-page__footer">
      Déjà un compte ?
      <a routerLink="/auth/login">Se connecter</a>
    </p>
  </div>
</div>
