<div
  class="game"
  (keydown)="onKeyDown($event)"
  tabindex="0"
  aria-label="Grille de mots fléchés"
>
  <!-- Navbar -->
  <nav class="game__nav">
    <span class="text-display game__brand">CoCro</span>
    <div class="game__nav-info">
      <span class="game__code text-mono">{{ shareCode() }}</span>
      <span class="section-label">{{ participantCount() }} joueur{{ participantCount() > 1 ? 's' : '' }}</span>
      <span class="game__revision text-muted">rév.{{ revision() }}</span>
      @if (!connected()) {
        <span class="game__offline">hors ligne</span>
      }
    </div>
    <cocro-button variant="ghost" (click)="leave()">Quitter</cocro-button>
  </nav>
  <hr class="divider" />

  <!-- Board -->
  <main class="game__board">
    <div class="game__grid">
      @for (row of rows(); track $index) {
        <div class="game__row">
          @for (cell of row; track cell.x) {
            <div
              class="game__cell"
              [class.game__cell--selected]="isSelected(cell.x, cell.y)"
              [class.game__cell--filled-me]="cell.letter && cell.actorId === 'me'"
              [class.game__cell--filled-other]="cell.letter && cell.actorId !== 'me' && cell.actorId !== ''"
              (click)="selectCell(cell.x, cell.y)"
              [attr.aria-label]="'Case ' + cell.x + ',' + cell.y + (cell.letter ? ' : ' + cell.letter : '')"
            >
              @if (cell.letter) {
                <span class="game__letter">{{ cell.letter }}</span>
              }
            </div>
          }
        </div>
      }
    </div>
  </main>
</div>
