<div class="my-grids">
  <nav class="my-grids__nav">
    <a routerLink="/" class="text-display">← CoCro</a>
  </nav>
  <hr class="divider" />

  <div class="my-grids__content">
    <div class="my-grids__header">
      <span class="section-label">Mon atelier</span>
      <h1>Mes grilles</h1>
    </div>

    @if (loading()) {
      <div class="my-grids__loading">Chargement...</div>
    } @else if (error()) {
      <div class="my-grids__error">
        <p>{{ error() }}</p>
        <cocro-button variant="secondary" (click)="retry()">Réessayer</cocro-button>
      </div>
    } @else if (grids().length === 0) {
      <div class="my-grids__empty">
        <p class="text-muted">Vous n'avez pas encore créé de grille.</p>
        <cocro-button variant="primary" routerLink="/grid/create">
          Créer une première grille
        </cocro-button>
      </div>
    } @else {
      <div class="my-grids__actions-bar">
        <cocro-button variant="primary" routerLink="/grid/create">
          Nouvelle grille
        </cocro-button>
      </div>
      <div class="my-grids__grid-list">
        @for (grid of grids(); track grid.gridId) {
          <cocro-grid-card
            [grid]="grid"
            [class.launching]="launching() === grid.gridId"
            (launchSession)="onLaunch(grid)"
            (edit)="onEdit(grid)"
          />
        }
      </div>
    }
  </div>
</div>
