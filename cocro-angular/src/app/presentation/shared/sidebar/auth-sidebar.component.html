<aside class="auth-sidebar" [class.auth-sidebar--collapsed]="collapsed()">
  <button
    type="button"
    class="auth-sidebar__collapse"
    (click)="toggle.emit()"
    aria-label="Replier la navigation"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="10,3 5,8 10,13"/>
      <polyline points="14,3 9,8 14,13"/>
    </svg>
  </button>

  <div class="auth-sidebar__top">
    <a routerLink="/" class="auth-sidebar__brand">
      <span class="auth-sidebar__brand-mark text-display">CoCro</span>
      <span class="auth-sidebar__brand-text">Atelier collaboratif</span>
    </a>
  </div>

  <nav class="auth-sidebar__nav" aria-label="Navigation principale">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="auth-sidebar__link" (click)="onNavigate()">
      <span>Accueil</span>
    </a>
    @if (auth.isAuthenticated()) {
      <a routerLink="/grid/create" routerLinkActive="is-active" class="auth-sidebar__link" (click)="onNavigate()">
        <span>Éditeur</span>
      </a>
      <a routerLink="/lobby/create" routerLinkActive="is-active" class="auth-sidebar__link" (click)="onNavigate()">
        <span>Session</span>
      </a>
    } @else {
      <a routerLink="/auth/login" routerLinkActive="is-active" class="auth-sidebar__link" (click)="onNavigate()">
        <span>Connexion</span>
      </a>
      <a routerLink="/auth/register" routerLinkActive="is-active" class="auth-sidebar__link" (click)="onNavigate()">
        <span>Inscription</span>
      </a>
    }
  </nav>

  @if (auth.isAuthenticated()) {
    <div class="auth-sidebar__footer">
      <div class="auth-sidebar__user">
        <span class="auth-sidebar__user-label">Connecté en tant que</span>
        <strong>{{ auth.currentUser()?.username }}</strong>
      </div>
      <button type="button" class="auth-sidebar__logout" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </button>
    </div>
  }
</aside>
