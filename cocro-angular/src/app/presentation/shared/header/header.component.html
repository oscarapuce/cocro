<header class="app-header">
  <a routerLink="/" class="brand">CoCro</a>

  <nav class="header-actions">
    @if (auth.isAuthenticated()) {
      <span class="username">{{ auth.currentUser()?.username }}</span>
      <cocro-button variant="ghost" (click)="logout()">Deconnexion</cocro-button>
    } @else {
      <cocro-button variant="ghost" routerLink="/auth/login">Connexion</cocro-button>
      <cocro-button variant="secondary" routerLink="/auth/register">Creer un compte</cocro-button>
    }
  </nav>
</header>
