<div class="landing-home-shell">
  <ng-content select="[shell-banner]" />

  @if (showTopNav()) {
    <nav class="landing-home-shell__nav">
      <span class="landing-home-shell__nav-brand text-display">CoCro</span>
      <div class="landing-home-shell__nav-actions">
        @if (navUser()) {
          <span class="landing-home-shell__nav-user text-muted">{{ navUser() }}</span>
        }
        <ng-content select="[shell-nav-actions]" />
      </div>
    </nav>
    <hr class="divider" />
  }

  <header class="landing-home-shell__hero">
    <h1 [innerHTML]="heroTitle()"></h1>
    <p class="text-muted">{{ heroSubtitle() }}</p>
  </header>

  <hr class="divider" />

  <main class="landing-home-shell__main" [class.landing-home-shell__main--single]="singlePanel()">
    <section class="landing-home-shell__panel">
      <ng-content select="[shell-left-panel]" />
    </section>

    <section class="landing-home-shell__panel landing-home-shell__panel--dark">
      <ng-content select="[shell-right-panel]" />
    </section>
  </main>
</div>
