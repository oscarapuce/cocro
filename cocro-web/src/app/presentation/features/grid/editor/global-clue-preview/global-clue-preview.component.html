@if (previewWords().length) {
  <div class="gcp">
    <div class="gcp__row">
      @for (word of previewWords(); track $index) {
        <div class="gcp__word">
          @for (cell of word; track cell.index) {
            <span class="gcp__cell">
              <span class="gcp__cell-num">{{ cell.index }}</span>
              {{ cell.letter }}
            </span>
          }
        </div>
      }
    </div>
  </div>
}
