spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

cocro:
  cors:
    allowed-origins:
      - ${COCRO_CORS_ORIGIN}
  jwt:
    issuer: "cocro-api"
    secret: ${COCRO_JWT_SECRET}
    expirationSeconds: 86400
  session:
    heartbeat:
      grace-period-ms: 30000
      check-interval-ms: 15000
    flush:
      threshold: 50
      idle-check-ms: 30000
