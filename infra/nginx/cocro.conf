server {
    listen 80;
    server_name cocro.fr www.cocro.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cocro.fr www.cocro.fr;

    ssl_certificate /etc/letsencrypt/live/cocro.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cocro.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── API REST ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (SockJS + STOMP) ────────────────────────────────────────────
    # SockJS génère des sous-chemins : /ws/info, /ws/{server}/{session}/websocket
    location /ws {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        # Headers nécessaires pour l'upgrade WebSocket
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;  # maintenir la connexion ouverte
        proxy_send_timeout 3600s;
    }

    # ── Frontend Angular (SPA) ────────────────────────────────────────────────
    location / {
        root  /var/www/cocro;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root    /var/www/cocro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sécurité ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options      "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection     "1; mode=block";
}
