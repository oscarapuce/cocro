# ── compose.prod.yml ─────────────────────────────────────────
# Déploiement MVP sur VPS avec Podman Compose
# Usage:
#   cp .env.prod.template .env.prod    # remplir les vraies valeurs
#   podman compose -f compose.prod.yml --env-file .env.prod up -d
# ─────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - cocro-net

  redis:
    image: redis:7
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - cocro-net

  cocro-bff:
    build:
      context: ./cocro-bff
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/cocro?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - mongo
      - redis
    networks:
      - cocro-net

volumes:
  mongo-data:
  redis-data:

networks:
  cocro-net:

